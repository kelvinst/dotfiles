format = """\
$character\
([ \
$git_status\
](bg:bg-border))\
[ \
$directory\
$fill\
](bg:bg-middle)\
([ \
$status\
](black bg:green))\
$line_break"""

add_newline = false
command_timeout = 3000

palette = 'tokyo-night-moon'

[palettes.tokyo-night-moon]
bg-border = '#3b4261'
bg-middle = '#2f334d'
bg-inactive = '0'
fg-black = '0'
fg-red = '1'
fg-green = '2'
fg-yellow = '3'
fg-blue = '4'
fg-purple = '5'
fg-cyan = '6'
fg-white = '7'
fg-neon-black = '240'
fg-neon-red = '196'
fg-neon-green = '46'
fg-neon-yellow = '226'
fg-neon-blue = '39'
fg-neon-purple = '201'
fg-neon-cyan = '49'
fg-neon-white = '231'
fg-orange = '208'
fg-vermilion = '202'
fg-lime = '149'
fg-lavender = '147'
fg-periwinkle = '105'

[character]
disabled = false
format = '$symbol'
success_symbol = '[ I ](bold black bg:green)'
error_symbol = '[ I ](bold black bg:green)'
vimcmd_symbol = '[ N ](bold black bg:blue)'
vimcmd_replace_one_symbol = '[ R ](bold black bg:red)'
vimcmd_replace_symbol = '[ R ](bold black bg:red)'
vimcmd_visual_symbol = '[ V ](bold black bg:purple)'

[fill]
disabled = false
style = 'bg:bg-middle'
symbol = ' '

[directory]
disabled = false
repo_root_format = """
[$before_root_path]($before_repo_root_style)\
[$repo_root]($repo_root_style)\
[$path]($style)\
[$read_only]($read_only_style)"""
before_repo_root_style = 'white bg:bg-middle'
repo_root_style = 'bold cyan bg:bg-middle'
format = '[$path]($style)'
style = 'bold dimmed cyan bg:bg-middle'
read_only = '🔒'
truncate_to_repo = true
truncation_symbol = ''

[git_status]
disabled = false
format = '🌱([$all_status$ahead_behind ]($style))'
style = 'bold bg:bg-border'
conflicted = '[≠${count}](bold fg-neon-purple bg:bg-border)'
ahead = '[⇡${count}](bold fg-green bg:bg-border)'
behind = '[⇣${count}](bold fg-red bg:bg-border)'
diverged = '[⇡${ahead_count}](bold fg-green bg:bg-border)[⇣${behind_count}(bold fg-red bg:bg-border)'
up_to_date = '[✔︎](bold fg-green bg:bg-border)'
untracked = '[?${count}](bold fg-blue bg:bg-border)'
stashed = '[\$${count}](bold fg-purple bg:bg-border)'
modified = '[!${count}](bold fg-yellow bg:bg-border)'
staged = '[+${count}](bold fg-neon-green bg:bg-border)'
renamed = '[»${count}](bold fg-cyan bg:bg-border)'
deleted = '[x${count}](bold fg-neon-red bg:bg-border)'
typechanged = '[±${count}](bold fg-neon-blue bg:bg-border)'

[status]
disabled = false
format = '[$symbol$status ]($style)'
symbol = '❗'
failure_style = 'bold black bg:green'
success_style = 'bold black bg:green'
success_symbol = '✅'
not_executable_symbol = '🚫'
not_found_symbol = '❓'
signal_symbol = '💥'

[line_break]
disabled = false
