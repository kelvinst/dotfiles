# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
#
# `orbit move-workspace-to-secondary-monitor` seeds the initial monitor and
# layout for 0/m/o/p. Unlike `[workspace-to-monitor-force-assignment]` this
# only runs once, so `move-workspace-to-monitor` (alt-tab) can still
# reassign them freely at runtime.
after-startup-command = [
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0',
  'exec-and-forget orbit move-workspace-to-secondary-monitor 0 M O P',
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 300

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config version is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = []

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# Environment variables for exec-and-forget commands.
# See: https://nikitabobko.github.io/AeroSpace/guide#exec-env-vars
[exec]
    inherit-env-vars = true
[exec.env-vars]
    PATH = '/Users/kelvinstinghen/.local/bin:/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = 12
    inner.vertical =   12
    outer.left =       12
    outer.bottom =     12
    outer.top =        12
    outer.right =      12

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    alt-enter = 'exec-and-forget orbit focus main'
    alt-shift-enter = 'exec-and-forget orbit swap main'

    # Disabling macOS "Hide application" feature, because I don't use it
    # See: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
    cmd-h = [] # Disable "hide application"
    cmd-alt-h = [] # Disable "hide others"

    alt-a = [
      'exec-and-forget orbit flatten-workspace-tree', 
      'layout accordion tiles'
    ]
    alt-shift-a = [
      'exec-and-forget orbit flatten-workspace-tree', 
      'layout horizontal vertical'
    ]

    alt-s = 'exec-and-forget orbit preset --main-size +150 2-col-left 2-col-right'
    alt-shift-s = 'exec-and-forget orbit preset --main-size +50 2-row-top 2-row-bottom'

    alt-d = 'exec-and-forget orbit preset --main-size +500 3-col-left 3-col-middle 3-col-right'
    alt-shift-d = 'exec-and-forget orbit preset --main-size +50 3-row-top 3-row-middle 3-row-bottom'

    alt-f = 'layout floating tiling' # Toggle between floating and tiling layout
    alt-z = 'fullscreen'

    # Reload stuff
    alt-x = 'exec-and-forget orbit preset refresh || orbit flatten-workspace-tree'
    alt-b = 'balance-sizes'
    alt-r = [
      'exec-and-forget orbit cleanup', 
      'reload-config', 
      '''exec-and-forget osascript -e '
        display notification "Config reloaded" with title "AeroSpace"' 
      '''
    ]

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    alt-h = 'exec-and-forget orbit focus --boundaries-action sibling-workspace left'
    alt-j = 'exec-and-forget orbit focus --boundaries-action sibling-workspace down'
    alt-k = 'exec-and-forget orbit focus --boundaries-action sibling-workspace up'
    alt-l = 'exec-and-forget orbit focus --boundaries-action sibling-workspace right'
    # ctrl-hjkl is handled by skhd so kitty can keep its own ctrl-hjkl
    # bindings (vim split → kitty pane → orbit chain via pass_keys.py).

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    alt-shift-h = 'exec-and-forget orbit swap-or-move-node-to-workspace left'
    alt-shift-j = 'exec-and-forget orbit swap-or-move-node-to-workspace down'
    alt-shift-k = 'exec-and-forget orbit swap-or-move-node-to-workspace up'
    alt-shift-l = 'exec-and-forget orbit swap-or-move-node-to-workspace right'
    ctrl-shift-h = 'exec-and-forget orbit swap-or-move-node-to-workspace left'
    ctrl-shift-j = 'exec-and-forget orbit swap-or-move-node-to-workspace down'
    ctrl-shift-k = 'exec-and-forget orbit swap-or-move-node-to-workspace up'
    ctrl-shift-l = 'exec-and-forget orbit swap-or-move-node-to-workspace right'

    alt-shift-ctrl-h = 'exec-and-forget orbit move --boundaries-action sibling-workspace left'
    alt-shift-ctrl-j = 'exec-and-forget orbit move --boundaries-action sibling-workspace down'
    alt-shift-ctrl-k = 'exec-and-forget orbit move --boundaries-action sibling-workspace up'
    alt-shift-ctrl-l = 'exec-and-forget orbit move --boundaries-action sibling-workspace right'

    alt-ctrl-h = 'join-with left'
    alt-ctrl-j = 'join-with down'
    alt-ctrl-k = 'join-with up'
    alt-ctrl-l = 'join-with right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    alt-0 = 'workspace 0'
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-m = 'workspace M'
    alt-o = 'workspace O'
    alt-p = 'workspace P'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    alt-shift-0 = 'move-node-to-workspace 0 --focus-follows-window'
    alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
    alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
    alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
    alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
    alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
    alt-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'
    alt-shift-7 = 'move-node-to-workspace 7 --focus-follows-window'
    alt-shift-8 = 'move-node-to-workspace 8 --focus-follows-window'
    alt-shift-9 = 'move-node-to-workspace 9 --focus-follows-window'
    alt-shift-m = 'move-node-to-workspace M --focus-follows-window'
    alt-shift-o = 'move-node-to-workspace O --focus-follows-window'
    alt-shift-p = 'move-node-to-workspace P --focus-follows-window'

    alt-ctrl-0 = 'summon-workspace 0'
    alt-ctrl-1 = 'summon-workspace 1'
    alt-ctrl-2 = 'summon-workspace 2'
    alt-ctrl-3 = 'summon-workspace 3'
    alt-ctrl-4 = 'summon-workspace 4'
    alt-ctrl-5 = 'summon-workspace 5'
    alt-ctrl-6 = 'summon-workspace 6'
    alt-ctrl-7 = 'summon-workspace 7'
    alt-ctrl-8 = 'summon-workspace 8'
    alt-ctrl-9 = 'summon-workspace 9'
    alt-ctrl-m = 'summon-workspace M'
    alt-ctrl-o = 'summon-workspace O'
    alt-ctrl-p = 'summon-workspace P'

    alt-ctrl-shift-0 = 'exec-and-forget orbit move-workspace --focus-follows-workspace 0'
    alt-ctrl-shift-1 = 'exec-and-forget orbit move-workspace --focus-follows-workspace 1'
    alt-ctrl-shift-2 = 'exec-and-forget orbit move-workspace --focus-follows-workspace 2'
    alt-ctrl-shift-3 = 'exec-and-forget orbit move-workspace --focus-follows-workspace 3'
    alt-ctrl-shift-4 = 'exec-and-forget orbit move-workspace --focus-follows-workspace 4'
    alt-ctrl-shift-5 = 'exec-and-forget orbit move-workspace --focus-follows-workspace 5'
    alt-ctrl-shift-6 = 'exec-and-forget orbit move-workspace --focus-follows-workspace 6'
    alt-ctrl-shift-7 = 'exec-and-forget orbit move-workspace --focus-follows-workspace 7'
    alt-ctrl-shift-8 = 'exec-and-forget orbit move-workspace --focus-follows-workspace 8'
    alt-ctrl-shift-9 = 'exec-and-forget orbit move-workspace --focus-follows-workspace 9'
    alt-ctrl-shift-m = 'exec-and-forget orbit move-workspace --focus-follows-workspace M'
    alt-ctrl-shift-o = 'exec-and-forget orbit move-workspace --focus-follows-workspace O'
    alt-ctrl-shift-p = 'exec-and-forget orbit move-workspace --focus-follows-workspace P'

    alt-period = 'workspace --wrap-around next'
    alt-comma = 'workspace --wrap-around prev'
    alt-shift-period = 'move-node-to-workspace --wrap-around --focus-follows-window next'
    alt-shift-comma = 'move-node-to-workspace --wrap-around --focus-follows-window prev'

    alt-rightSquareBracket = 'focus-monitor --wrap-around next'
    alt-leftSquareBracket = 'focus-monitor --wrap-around prev'
    alt-shift-rightSquareBracket = 'move-workspace-to-monitor --wrap-around next'
    alt-shift-leftSquareBracket = 'move-workspace-to-monitor --wrap-around prev'

    # Opening applications
    cmd-ctrl-enter = 'exec-and-forget orbit open net.kovidgoyal.kitty'
    cmd-ctrl-1 = 'exec-and-forget orbit open com.1password.1password'
    cmd-ctrl-comma = 'exec-and-forget orbit open com.apple.systempreferences'
    cmd-ctrl-a = 'exec-and-forget orbit open -g -p com.anthropic.claudefordesktop'
    cmd-ctrl-c = 'exec-and-forget orbit open -g com.apple.iCal'
    cmd-ctrl-b = 'exec-and-forget orbit open com.google.Chrome'
    cmd-ctrl-f = 'exec-and-forget orbit open com.apple.finder'
    cmd-ctrl-k = 'exec-and-forget orbit open -g io.zsa.keymapp'
    cmd-ctrl-m = 'exec-and-forget orbit open -g com.apple.mail'
    cmd-ctrl-n = 'exec-and-forget orbit open com.apple.Notes'
    cmd-ctrl-p = 'exec-and-forget orbit open -g com.apple.Music'
    cmd-ctrl-w = 'exec-and-forget orbit open -g net.whatsapp.WhatsApp'
    cmd-ctrl-z = 'exec-and-forget orbit open -g us.zoom.xos'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['exec-and-forget orbit flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']
    # Re-seed the secondary-monitor assignments. Mirrors `after-startup-command`
    # for when a monitor reconnect or config change drops the pinning.
    m = [
      'exec-and-forget orbit move-workspace-to-secondary-monitor 0 M O P',
      'mode main',
    ]

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

# Set the default layout as accordion for secondary monitor workspaces
[[on-window-detected]]
    if.workspace = '0'
    check-further-callbacks = true
    run = ['layout accordion']

[[on-window-detected]]
    if.workspace = 'M'
    check-further-callbacks = true
    run = ['layout accordion']

[[on-window-detected]]
    if.workspace = 'O'
    check-further-callbacks = true
    run = ['layout accordion']

[[on-window-detected]]
    if.workspace = 'P'
    check-further-callbacks = true
    run = ['layout accordion']

# Redirect apps to their default workspaces when they are first opened
[[on-window-detected]]
    if.app-id = 'com.apple.mail'
    run = ['move-node-to-workspace M']

[[on-window-detected]]
    if.app-id = 'net.whatsapp.WhatsApp'
    run = ['move-node-to-workspace M']

[[on-window-detected]]
    if.app-id = 'us.zoom.xos'
    run = ['move-node-to-workspace M']

[[on-window-detected]]
    if.app-id = 'io.zsa.keymapp'
    run = ['move-node-to-workspace O']

[[on-window-detected]]
    if.app-id = 'com.apple.Music'
    run = ['move-node-to-workspace O', 'layout tiling']

[[on-window-detected]]
    if.app-id = 'com.apple.iCal'
    run = ['move-node-to-workspace P']

# [[on-window-detected]]
#     run = ['exec-and-forget orbit preset refresh']
